<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SNES Stick Sniper – Mobile Friendly</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-ms-touch-action:none}
    canvas{
      width:100vw;height:100vh;display:block;
      image-rendering:pixelated;image-rendering:crisp-edges;
      touch-action:none;
    }
    #hint{
      position:fixed;left:8px;bottom:8px;
      font:12px/1.2 monospace;color:#fff;opacity:0.55;
      background:rgba(0,0,0,0.45);padding:6px 8px;border-radius:8px;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">Tap to shoot • Drag to aim • 2‑finger tap: mute</div>
<script>
// ================= INTERNAL RES (SNES) =================
const W = 384, H = 216;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;
ctx.imageSmoothingEnabled = false;

// ================= INPUT STATE =================
let pointerDown = false;
let aimX = W/2, aimY = H/2;
let lastTapTime = 0;
let muted = false;

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
function getInternalXY(clientX, clientY){
  const r = canvas.getBoundingClientRect();
  const x = (clientX - r.left) / r.width * W;
  const y = (clientY - r.top) / r.height * H;
  return { x: clamp(x, 0, W), y: clamp(y, 0, H) };
}

// Prevent page gestures on mobile
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

// ================= AUDIO (REALISTIC VOICES SYNCED) =================
let audioCtx = null, noiseBuf = null, masterGain = null;
let activeVoices = 0;
const MAX_VOICES = 3;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(audioCtx.destination);

  const len = audioCtx.sampleRate * 2;
  noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2 - 1;
}
function setMuted(m){
  muted = m;
  if(masterGain) masterGain.gain.value = muted ? 0 : 0.6;
}

function triggerPanicVoice(npc, distance=1){
  if(!audioCtx || muted) return;
  if(activeVoices >= MAX_VOICES) return;
  activeVoices++;

  const t = audioCtx.currentTime;
  const dur = 0.45 + Math.random() * 0.25;

  // Shared envelope for animation sync
  npc.panic = { time: 0, duration: dur, amp: 1 };

  // Breathy noise
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuf;

  // Formants
  const f1 = audioCtx.createBiquadFilter();
  f1.type = 'bandpass'; f1.frequency.value = 700 + Math.random()*200; f1.Q.value = 3;
  const f2 = audioCtx.createBiquadFilter();
  f2.type = 'bandpass'; f2.frequency.value = 1200 + Math.random()*300; f2.Q.value = 4;

  // Formant sweeps up (panic)
  f1.frequency.exponentialRampToValueAtTime(900 + Math.random()*200, t + dur*0.6);
  f2.frequency.exponentialRampToValueAtTime(1600 + Math.random()*300, t + dur*0.6);

  // Grit
  const ws = audioCtx.createWaveShaper();
  const curve = new Float32Array(256);
  for(let i=0;i<256;i++){
    const x = i*2/256 - 1;
    curve[i] = Math.tanh(x * 1.6);
  }
  ws.curve = curve;

  const g = audioCtx.createGain();
  const vol = Math.max(0.12, 0.30 / Math.max(1, distance));
  g.gain.setValueAtTime(0.001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);

  const pan = audioCtx.createStereoPanner();
  pan.pan.value = (Math.random()*2 - 1) * 0.6;

  src.connect(f1); f1.connect(f2); f2.connect(ws); ws.connect(g); g.connect(pan); pan.connect(masterGain);
  src.start(t);
  src.stop(t + dur);

  setTimeout(() => activeVoices = Math.max(0, activeVoices - 1), (dur + 0.1) * 1000);
}

// ================= ENEMIES / GROUP PANIC =================
let enemies = [];
const MAX_ENEMIES = 10;
const PANIC_RADIUS = 90;
const PANIC_CHAIN_DEPTH = 2;

function spawnEnemy(){
  enemies.push({
    x: Math.random()*(W-40) + 20,
    y: H - 40,
    alive: true,
    scared: false,
    panic: null,
    runDir: Math.random() < 0.5 ? -1 : 1
  });
}
for(let i=0;i<MAX_ENEMIES;i++) spawnEnemy();

function propagatePanic(source, depth=0){
  if(depth > PANIC_CHAIN_DEPTH) return;
  for(const e of enemies){
    if(!e.alive || e.scared) continue;
    const dist = Math.hypot(e.x - source.x, e.y - source.y);
    if(dist < PANIC_RADIUS){
      e.scared = true;
      triggerPanicVoice(e, dist / PANIC_RADIUS);
      setTimeout(() => propagatePanic(e, depth + 1), 90 + Math.random()*160);
    }
  }
}

// ================= SHOOTING =================
function shootAt(x, y){
  // Larger finger-friendly hitbox
  const HIT_W = 10;
  const HIT_H = 18;
  for(const en of enemies){
    if(!en.alive) continue;
    if(Math.abs(x - en.x) < HIT_W && Math.abs(y - en.y) < HIT_H){
      en.alive = false;
      propagatePanic(en);
      break;
    }
  }
}

// ================= POINTER EVENTS =================
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  initAudio();

  pointerDown = true;
  const p = getInternalXY(e.clientX, e.clientY);
  aimX = p.x; aimY = p.y;

  // Touch: tap to shoot, drag to aim
  if(e.pointerType === 'touch'){
    const now = performance.now();
    // Double tap shoots (and feels snappy on mobile)
    if(now - lastTapTime < 260){
      shootAt(aimX, aimY);
      lastTapTime = 0;
    } else {
      lastTapTime = now;
      shootAt(aimX, aimY);
    }
  } else {
    // Mouse
    shootAt(aimX, aimY);
  }
});

canvas.addEventListener('pointermove', (e) => {
  const p = getInternalXY(e.clientX, e.clientY);
  aimX = p.x; aimY = p.y;
});

canvas.addEventListener('pointerup', () => { pointerDown = false; });
canvas.addEventListener('pointercancel', () => { pointerDown = false; });

// Two-finger tap = mute toggle
canvas.addEventListener('touchstart', (e) => {
  if(e.touches && e.touches.length === 2){
    initAudio();
    setMuted(!muted);
  }
}, {passive:false});

// ================= UPDATE =================
function update(){
  enemies = enemies.filter(e => e.alive);
  while(enemies.length < MAX_ENEMIES) spawnEnemy();

  for(const e of enemies){
    if(e.scared){
      e.x += e.runDir * 0.8;
      if(e.x < -10) e.x = W + 10;
      if(e.x > W + 10) e.x = -10;
      if(e.panic){
        e.panic.time += 1/60;
        if(e.panic.time > e.panic.duration) e.panic = null;
      }
    }
  }
}

// ================= DRAW =================
function drawEnemy(e){
  const panicAmp = e.panic ? Math.sin((e.panic.time / e.panic.duration) * Math.PI) : 0;
  const shake = (Math.random() - 0.5) * panicAmp * 2;
  const bx = e.x + shake;
  const by = e.y;

  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;

  // Body
  ctx.beginPath();
  ctx.moveTo(bx, by - 18);
  ctx.lineTo(bx, by);
  ctx.stroke();

  // Arms flailing
  const armSwing = panicAmp * 8;
  ctx.beginPath();
  ctx.moveTo(bx, by - 12);
  ctx.lineTo(bx - 6 - armSwing, by - 8);
  ctx.moveTo(bx, by - 12);
  ctx.lineTo(bx + 6 + armSwing, by - 8);
  ctx.stroke();

  // Legs
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx - 5, by + 12);
  ctx.moveTo(bx, by);
  ctx.lineTo(bx + 5, by + 12);
  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(bx, by - 24, 4, 0, Math.PI * 2);
  ctx.stroke();

  // Panic face
  if(panicAmp > 0){
    ctx.fillStyle = '#000';
    ctx.fillRect(bx - 3, by - 26, 2, 2);
    ctx.fillRect(bx + 1, by - 26, 2, 2);
    ctx.fillRect(bx - 1, by - 22, 2, 3);
  }
}

function draw(){
  ctx.fillStyle = '#88c8f8';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#68a030';
  ctx.fillRect(0, H - 30, W, 30);

  for(const e of enemies) drawEnemy(e);

  // On-screen crosshair
  ctx.strokeStyle = 'rgba(216,48,48,0.85)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(aimX - 6, aimY);
  ctx.lineTo(aimX + 6, aimY);
  ctx.moveTo(aimX, aimY - 6);
  ctx.lineTo(aimX, aimY + 6);
  ctx.stroke();

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(6, 6, 132, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textBaseline = 'top';
  ctx.fillText('Mobile mode | Mute: ' + (muted ? 'ON' : 'OFF'), 10, 9);
}

function loop(){
  update();
  ctx.clearRect(0, 0, W, H);
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
